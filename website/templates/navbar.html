<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecommerce ropa</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        
        
        .navbar-elegante {
            background-color: #f5f2ed;
            border-bottom: 1px solid #888880;
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        
        
        .logo-font {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; 
            color: #212529; 
            text-decoration: none;
        }

        .logo-acento {
            color: #c8a96e; 
            font-style: italic; 
        }

        
        .nav-link {
            font-family: 'Lato', sans-serif;
            color: #555555 !important; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1.5px; 
            font-weight: 400;
        }

        .nav-link:hover {
            color: #c8a96e !important; 
        }

        
        .btn-cart {
            background-color: #f5f2ed; 
            color: #888880; 
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: none;
            border-radius: 0; 
            padding: 10px 20px;
        }

        .btn-cart:hover {
            background-color: #c8a96e; 
            color: #f5f2ed;
        }
        
        
        .dropdown-menu {
            border-radius: 0;
            border: 1px solid #eeeae3;
        }
        .dropdown-item {
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #888880;
        }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-elegante">
        <div class="container-fluid px-4 px-lg-5">
            
            <a class="navbar-brand logo-font" href="#">
                Ropa<span class="logo-acento">Store</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacion" aria-controls="menuNavegacion" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNavegacion">
                
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item px-2">
                        <a id="nav inicio" class="nav-link active" aria-current="page" href="#">Inicio</a>
                    </li>
                    
                    <li class="nav-item dropdown px-2">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Productos
                        </a>
                        <ul class="dropdown-menu mt-2" aria-labelledby="navbarDropdown">
                            <li><a id="nav-hombre" class="dropdown-item py-2" href="#">Hombre</a></li>
                            <li><a id="nav-mujer" class="dropdown-item py-2" href="#">Mujer</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a id="nav-descuentos" class="dropdown-item py-2" href="#" style="color: #c95c5c;">Descuentos</a></li>
                        </ul>
                    </li>

                    <li class="nav-item px-2">
                        <a id="nav-contacto" class="nav-link" href="#">Contacto</a>
                    </li>
                </ul>

                <form class="d-flex mt-3 mt-lg-0">
                    <button id="btn-cart" class="btn btn-cart d-flex align-items-center" type="button">
                        <i class="bi bi-cart2 fs-5 me-2"></i> Tu cesta
                    </button>
                </form>
            </div>
            
        </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
